# Vivi-app Repository Workflow Template
# =========================================
# Copy this file to: vivi-app/.github/workflows/trigger-docs.yml
# This file triggers the documentation pipeline in vivim-live when vivi-app code changes

name: Trigger Documentation Update

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'lib/**'
      - '*.ts'
      - '*.tsx'
      - '!*.test.ts'
      - '!*.spec.ts'
      - '!node_modules/**'
  pull_request:
    types: [closed]
    branches: [main, master]
    paths:
      - 'src/**'
      - 'packages/**'

# Prevent infinite loops - only trigger on merge or push
jobs:
  trigger-docs:
    if: >
      (github.event_name == 'push' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger vivim-live documentation pipeline
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Triggering vivim-live documentation pipeline...');
            console.log('Commit: ${{ github.sha }}');
            console.log('Branch: ${{ github.ref_name }}');
            
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'owenservera',
                repo: 'vivim-live',
                event_type: 'vivi-app-changed',
                client_payload: {
                  branch: '${{ github.ref_name }}',
                  commit: '${{ github.sha }}',
                  author: '${{ github.actor }}',
                  trigger: 'push'
                }
              });
              console.log('Successfully triggered vivim-live workflow!');
            } catch (error) {
              console.error('Failed to trigger:', error.message);
              // Don't fail the workflow if trigger fails
              console.log('Continuing - vivim-live will catch changes on next schedule');
            }
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
