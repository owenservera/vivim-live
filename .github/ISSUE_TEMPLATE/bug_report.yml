name: 🐛 Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Description
        A clear and concise description of what the bug is.

        ## Steps to Reproduce
        1. Go to '...'
        2. Click on '....'
        3. See error

        ## Expected Behavior
        What you expected to happen.

        ## Actual Behavior
        What actually happened.

        ## Screenshots
        If applicable, add screenshots to help explain your problem.

        ## Environment
        - OS: [e.g., macOS, Windows, Linux]
        - Browser: [e.g., Chrome, Safari, Firefox]
        - Version: [e.g., v1.0.0]

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Detailed steps to reproduce the bug"
      placeholder: |
        1. First step
        2. Second step
        3. Third step
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What you expected to happen"
      placeholder: "A clear description of what you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened"
      placeholder: "A clear description of what actually happened"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "VIVIM Version"
      description: "Which version of VIVIM are you using?"
      placeholder: "e.g., v1.0.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs"
      description: "Include any relevant error messages or stack traces"
      placeholder: "Paste any relevant error messages or stack traces here"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: "Code of Conduct"
      description: |
        By submitting this issue, I agree to follow the [VIVIM Code of Conduct](https://github.com/owenservera/vivim-live/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: "I agree to follow this project's Code of Conduct"
          required: true
