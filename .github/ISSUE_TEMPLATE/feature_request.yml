name: ✨ Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Is your feature request related to a problem?
        A clear and concise description of what the problem is.
        Ex. I'm always frustrated when [...]

        ## Desired Solution
        Describe the solution you'd like to have implemented.

        ## Alternatives
        Describe alternatives you've considered.

        ## Additional Context
        Add any other context or screenshots about the feature request here.

  - type: textarea
    id: problem
    attributes:
      label: "Problem or Motivation"
      description: "Describe the problem or motivation for this feature"
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the solution you'd like"
      placeholder: "I would like to see..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Describe any alternative solutions you've considered"
      placeholder: "I've considered..."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Add any other context or screenshots about the feature request"
      placeholder: "Add any other context here"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: "Code of Conduct"
      description: |
        By submitting this feature request, I agree to follow the [VIVIM Code of Conduct](https://github.com/owenservera/vivim-live/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: "I agree to follow this project's Code of Conduct"
          required: true
